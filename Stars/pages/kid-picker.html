<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Picker de perfil — LittleStars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:ital,opsz,wght@1,9..144,600;1,9..144,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: 'Nunito', system-ui, sans-serif; }
    .font-display { font-family: 'Fraunces', Georgia, serif; font-style: italic; }
  </style>
</head>
<body class="bg-[#F8F5FF]">

  <div class="min-h-screen flex items-center justify-center px-4 py-8 md:py-12">
    <div class="w-full max-w-[430px] md:max-w-[520px] px-5 py-8 relative mx-auto">

      <!-- Header -->
      <div class="flex flex-col items-center">
        <!-- Star Mascot -->
        <svg class="w-10 h-10 md:w-12 md:h-12" viewBox="0 0 32 32" fill="none">
          <polygon points="16,2 19.5,11.5 29.5,11.5 21.5,17.5 24.5,27 16,21.5 7.5,27 10.5,17.5 2.5,11.5 12.5,11.5" fill="#FFC53D" stroke="#F59E0B" stroke-width="1"/>
          <circle cx="13" cy="16" r="1.5" fill="#2B2A3A"/>
          <circle cx="19" cy="16" r="1.5" fill="#2B2A3A"/>
          <path d="M13 20 Q16 22 19 20" stroke="#2B2A3A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>

        <h1 class="font-display text-2xl md:text-3xl text-[#2B2A3A] text-center mt-4">Quem vai brilhar hoje?</h1>
        <p class="text-[#6A6878] text-center mt-2">Escolha seu perfil para começar</p>
      </div>

      <!-- Profile grid — 2 cols mobile, 3 cols sm+ -->
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 md:gap-6 mt-8 md:mt-10">

        <!-- Renata (mom) -->
        <div class="bg-white rounded-[22px] p-6 flex flex-col items-center cursor-pointer hover:shadow-lg transition-shadow" style="box-shadow:0 2px 0 rgba(44,42,58,.04),0 10px 24px rgba(44,42,58,.06)">
          <div class="w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center text-2xl md:text-3xl font-bold mb-4" style="background: #FCE7F3; border: 3px solid #F9A8D4;">R</div>
          <p class="font-bold text-[#2B2A3A] text-lg">Renata</p>
          <p class="text-[#6A6878] text-sm mt-1">Responsável</p>
          <span class="mt-3 px-3 py-1 rounded-full text-xs font-bold bg-[#FCE7F3] text-[#EC4899]">MÃE</span>
        </div>

        <!-- João (dad) -->
        <div class="bg-white rounded-[22px] p-6 flex flex-col items-center cursor-pointer hover:shadow-lg transition-shadow" style="box-shadow:0 2px 0 rgba(44,42,58,.04),0 10px 24px rgba(44,42,58,.06)">
          <div class="w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center text-2xl md:text-3xl font-bold mb-4" style="background: #DBEAFE; border: 3px solid #93C5FD;">J</div>
          <p class="font-bold text-[#2B2A3A] text-lg">João</p>
          <p class="text-[#6A6878] text-sm mt-1">Responsável</p>
          <span class="mt-3 px-3 py-1 rounded-full text-xs font-bold bg-[#DBEAFE] text-[#3B82F6]">PAI</span>
        </div>

        <!-- Lila (kid) -->
        <div class="bg-white rounded-[22px] p-6 flex flex-col items-center cursor-pointer hover:shadow-lg transition-shadow" style="box-shadow:0 2px 0 rgba(44,42,58,.04),0 10px 24px rgba(44,42,58,.06)">
          <div class="w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center text-2xl md:text-3xl font-bold mb-4" style="background: #EDE9FE; border: 3px solid #C4B5FD;">L</div>
          <p class="font-bold text-[#2B2A3A] text-lg">Lila</p>
          <p class="text-[#6A6878] text-sm mt-1">42 ★</p>
          <span class="mt-3 px-3 py-1 rounded-full text-xs font-bold bg-[#F0EAFF] text-[#A78BFA]">CRIANÇA</span>
        </div>

        <!-- Theo (kid) -->
        <div class="bg-white rounded-[22px] p-6 flex flex-col items-center cursor-pointer hover:shadow-lg transition-shadow" style="box-shadow:0 2px 0 rgba(44,42,58,.04),0 10px 24px rgba(44,42,58,.06)">
          <div class="w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center text-2xl md:text-3xl font-bold mb-4" style="background: #CFFAFE; border: 3px solid #67E8F9;">T</div>
          <p class="font-bold text-[#2B2A3A] text-lg">Theo</p>
          <p class="text-[#6A6878] text-sm mt-1">28 ★</p>
          <span class="mt-3 px-3 py-1 rounded-full text-xs font-bold bg-[#F0EAFF] text-[#A78BFA]">CRIANÇA</span>
        </div>

        <!-- Zoe (kid) -->
        <div class="bg-white rounded-[22px] p-6 flex flex-col items-center cursor-pointer hover:shadow-lg transition-shadow" style="box-shadow:0 2px 0 rgba(44,42,58,.04),0 10px 24px rgba(44,42,58,.06)">
          <div class="w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center text-2xl md:text-3xl font-bold mb-4" style="background: #FCE7F3; border: 3px solid #F9A8D4;">Z</div>
          <p class="font-bold text-[#2B2A3A] text-lg">Zoe</p>
          <p class="text-[#6A6878] text-sm mt-1">15 ★</p>
          <span class="mt-3 px-3 py-1 rounded-full text-xs font-bold bg-[#F0EAFF] text-[#A78BFA]">CRIANÇA</span>
        </div>

        <!-- Add profile slot -->
        <div class="bg-white rounded-[22px] p-6 flex flex-col items-center cursor-pointer hover:shadow-lg transition-shadow border-2 border-dashed border-[rgba(44,42,58,0.16)]" style="box-shadow:0 2px 0 rgba(44,42,58,.02),0 4px 12px rgba(44,42,58,.03)">
          <div class="w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center mb-4 bg-[#F8F5FF] border-2 border-dashed border-[rgba(44,42,58,0.18)]">
            <i data-lucide="plus" class="w-8 h-8 text-[#A09EAE]"></i>
          </div>
          <p class="font-bold text-[#A09EAE] text-lg">Adicionar</p>
          <p class="text-[#A09EAE] text-sm mt-1">perfil</p>
          <span class="mt-3 px-3 py-1 rounded-full text-xs font-bold bg-[#F0EAFF] text-[#C4B5FD]">NOVO</span>
        </div>

      </div>

      <!-- Footer -->
      <div class="mt-10 text-center">
        <a href="parent-dashboard.html" class="text-[#A78BFA] font-semibold text-sm hover:underline">Modo pais →</a>
      </div>

    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
