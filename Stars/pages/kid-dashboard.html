<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard · Jornada — LittleStars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:ital,opsz,wght@1,9..144,600;1,9..144,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: 'Nunito', system-ui, sans-serif; }
    .font-display { font-family: 'Fraunces', Georgia, serif; font-style: italic; }
  </style>
</head>
<body class="bg-[#F8F5FF]">

  <div class="min-h-screen flex items-start justify-center py-0">
    <div class="w-full max-w-[430px] md:max-w-[480px] pb-28 relative mx-auto">

      <!-- Top bar -->
      <div class="p-5 flex items-center gap-3">
        <!-- Back button -->
        <a href="kid-picker.html" class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 bg-white" style="box-shadow:0 2px 0 rgba(44,42,58,.04),0 4px 12px rgba(44,42,58,.06)">
          <i data-lucide="arrow-left" class="w-4 h-4 text-[#6A6878]"></i>
        </a>

        <!-- Title block -->
        <div class="flex-1 text-center">
          <p class="text-[10px] font-bold uppercase tracking-widest text-[#A09EAE]">BOA TARDE,</p>
          <p class="font-display text-3xl text-[#2B2A3A] leading-none mt-0.5">Lila!</p>
        </div>

        <!-- Wallet pill + avatar -->
        <div class="flex items-center gap-2">
          <div class="flex items-center gap-1.5 bg-[#FFF4CC] text-[#2B2A3A] px-3 py-1.5 rounded-full font-bold text-sm">
            <i data-lucide="star" class="w-4 h-4 text-[#F59E0B]"></i>
            42
          </div>
          <div class="w-9 h-9 rounded-full bg-[#FDE68A] flex items-center justify-center text-lg">🙂</div>
        </div>
      </div>

      <!-- Cofrinho card -->
      <div class="mx-4 mt-1">
        <div class="bg-white rounded-[22px] p-5 md:p-6" style="box-shadow:0 2px 0 rgba(44,42,58,.04),0 10px 24px rgba(44,42,58,.06)">
          <div class="flex items-center justify-between mb-3">
            <div>
              <p class="text-[#6A6878] text-xs font-semibold uppercase tracking-wide">Minhas estrelinhas</p>
              <p class="font-display text-4xl text-[#2B2A3A] mt-1">42 <span class="text-[#FFC53D]">★</span></p>
            </div>
            <div class="w-12 h-12 rounded-[14px] bg-[#FFF8E6] flex items-center justify-center">
              <span class="text-2xl">🐷</span>
            </div>
          </div>
          <!-- Progress toward next reward -->
          <p class="text-[#A09EAE] text-xs mb-2">Próximo: Sorvete especial (50 ★) — faltam 8 ★</p>
          <div class="h-3 bg-[#F0EAFF] rounded-full overflow-hidden">
            <div class="h-full bg-[#A78BFA] rounded-full" style="width: 68%"></div>
          </div>
        </div>
      </div>

      <!-- Missions section -->
      <div class="px-4 mt-6">
        <h2 class="font-bold text-[#2B2A3A] text-base mb-4">Missões de hoje</h2>
        <div class="flex flex-col">

          <!-- 1. Arrumar quarto — approved -->
          <div class="relative flex gap-4 pb-6">
            <div class="absolute left-5 top-10 bottom-0 w-px border-l-2 border-dashed border-[rgba(44,42,58,.1)]"></div>
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 border-2 bg-[#D1FAE5] border-[#34D399] z-10">
              <i data-lucide="check" class="w-4 h-4 text-[#059669]"></i>
            </div>
            <div class="flex-1 bg-white rounded-[14px] p-4" style="box-shadow:0 2px 0 rgba(44,42,58,.04),0 6px 16px rgba(44,42,58,.05)">
              <div class="flex items-center justify-between">
                <p class="font-bold text-[#2B2A3A]">Arrumar quarto</p>
                <span class="flex items-center gap-0.5 text-[#FFC53D] font-bold text-sm">8 ★</span>
              </div>
              <span class="mt-1.5 inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-[#D1FAE5] text-[#059669]">
                <i data-lucide="check" class="w-3 h-3"></i>
                Aprovado
              </span>
            </div>
          </div>

          <!-- 2. Estudar inglês — awaiting -->
          <div class="relative flex gap-4 pb-6">
            <div class="absolute left-5 top-10 bottom-0 w-px border-l-2 border-dashed border-[rgba(44,42,58,.1)]"></div>
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 border-2 bg-[#FEF3C7] border-[#FCD34D] z-10">
              <i data-lucide="clock" class="w-4 h-4 text-[#D97706]"></i>
            </div>
            <div class="flex-1 bg-white rounded-[14px] p-4" style="box-shadow:0 2px 0 rgba(44,42,58,.04),0 6px 16px rgba(44,42,58,.05)">
              <div class="flex items-center justify-between">
                <p class="font-bold text-[#2B2A3A]">Estudar inglês</p>
                <span class="flex items-center gap-0.5 text-[#FFC53D] font-bold text-sm">12 ★</span>
              </div>
              <span class="mt-1.5 inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-[#FEF3C7] text-[#D97706]">
                <i data-lucide="clock" class="w-3 h-3"></i>
                Aguardando
              </span>
            </div>
          </div>

          <!-- 3. Ajudar mamãe — current (active, coral) -->
          <div class="relative flex gap-4 pb-6">
            <div class="absolute left-5 top-10 bottom-0 w-px border-l-2 border-dashed border-[rgba(44,42,58,.1)]"></div>
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 border-2 bg-white border-[#EC4899] z-10" style="box-shadow:0 0 0 4px rgba(236,72,153,0.15)">
              <i data-lucide="star" class="w-4 h-4 text-[#EC4899]"></i>
            </div>
            <div class="flex-1 bg-white rounded-[14px] p-4 border-2 border-[#EC4899]" style="box-shadow:0 2px 0 rgba(236,72,153,.06),0 8px 20px rgba(236,72,153,.12)">
              <div class="flex items-center justify-between">
                <p class="font-bold text-[#2B2A3A]">Ajudar mamãe</p>
                <span class="flex items-center gap-0.5 text-[#FFC53D] font-bold text-sm">6 ★</span>
              </div>
              <span class="mt-1.5 inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-[#FCE7F3] text-[#EC4899]">
                <i data-lucide="star" class="w-3 h-3"></i>
                Agora!
              </span>
            </div>
          </div>

          <!-- 4. Cuidar do pet — todo -->
          <div class="relative flex gap-4 pb-6">
            <div class="absolute left-5 top-10 bottom-0 w-px border-l-2 border-dashed border-[rgba(44,42,58,.1)]"></div>
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 border-2 bg-white border-[rgba(44,42,58,.12)] z-10">
              <i data-lucide="lock" class="w-4 h-4 text-[#A09EAE]"></i>
            </div>
            <div class="flex-1 bg-white rounded-[14px] p-4 opacity-60" style="box-shadow:0 2px 0 rgba(44,42,58,.02),0 4px 10px rgba(44,42,58,.04)">
              <div class="flex items-center justify-between">
                <p class="font-bold text-[#2B2A3A]">Cuidar do pet</p>
                <span class="flex items-center gap-0.5 text-[#FFC53D] font-bold text-sm">10 ★</span>
              </div>
              <span class="mt-1.5 inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-[#F0EAFF] text-[#A09EAE]">
                A fazer
              </span>
            </div>
          </div>

          <!-- 5. Ler livro — todo (last item, no line) -->
          <div class="relative flex gap-4">
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 border-2 bg-white border-[rgba(44,42,58,.12)] z-10">
              <i data-lucide="lock" class="w-4 h-4 text-[#A09EAE]"></i>
            </div>
            <div class="flex-1 bg-white rounded-[14px] p-4 opacity-60" style="box-shadow:0 2px 0 rgba(44,42,58,.02),0 4px 10px rgba(44,42,58,.04)">
              <div class="flex items-center justify-between">
                <p class="font-bold text-[#2B2A3A]">Ler livro</p>
                <span class="flex items-center gap-0.5 text-[#FFC53D] font-bold text-sm">5 ★</span>
              </div>
              <span class="mt-1.5 inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-[#F0EAFF] text-[#A09EAE]">
                A fazer
              </span>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- Bottom nav (fixed, floating pill) -->
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white rounded-[28px] px-6 py-3 flex items-center gap-8" style="box-shadow:0 4px 24px rgba(44,42,58,.14)">
    <!-- Jornada (active) -->
    <button class="flex flex-col items-center gap-1">
      <i data-lucide="target" class="w-6 h-6 text-[#A78BFA]"></i>
      <span class="text-[10px] font-bold text-[#A78BFA]">Jornada</span>
    </button>
    <!-- Lojinha -->
    <button class="flex flex-col items-center gap-1">
      <i data-lucide="shopping-bag" class="w-6 h-6 text-[#A09EAE]"></i>
      <span class="text-[10px] font-semibold text-[#A09EAE]">Lojinha</span>
    </button>
    <!-- Diário -->
    <button class="flex flex-col items-center gap-1">
      <i data-lucide="book-open" class="w-6 h-6 text-[#A09EAE]"></i>
      <span class="text-[10px] font-semibold text-[#A09EAE]">Diário</span>
    </button>
    <!-- Sair -->
    <button class="flex flex-col items-center gap-1">
      <i data-lucide="log-out" class="w-6 h-6 text-[#A09EAE]"></i>
      <span class="text-[10px] font-semibold text-[#A09EAE]">Sair</span>
    </button>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
