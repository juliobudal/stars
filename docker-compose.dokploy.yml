# Dokploy production deployment for LittleStars (Rails 8 monolith).
# 2 services: db (Postgres 16) + app (Rails, Solid Queue embedded in Puma).
# Reuses the external dokploy-network.
#
# TLS termina no Cloudflare Tunnel (na borda); o Traefik do Dokploy serve HTTP
# no origin (sem Let's Encrypt — LE não validaria num IP de LAN). Secrets vêm da
# Environment do Dokploy via interpolação ${VAR} (NÃO usar env_file: — o clone do
# Dokploy não tem o .env.production gitignored).

services:
  littlestars-app:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: littlestars-app:latest
    container_name: littlestars-app
    restart: unless-stopped
    # Migrations + seed automáticos no boot (não há passo manual pós-deploy no
    # modelo Dokploy-nativo): db:prepare cria/migra os 4 bancos (primary +
    # cache/queue/cable), db:seed é idempotente ("skip if families exist") e
    # popula catálogo + Academy. exec → Puma liga em 0.0.0.0:3000 (config/puma.rb).
    command: ["bash", "-c", "./bin/rails db:prepare && ./bin/rails db:seed && exec ./bin/rails server"]
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    environment:
      - RAILS_ENV=production
      - PORT=3000
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - SOLID_QUEUE_IN_PUMA=true
      - DATABASE_HOST=littlestars-db
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - PROD_POSTGRES_PASSWORD=${PROD_POSTGRES_PASSWORD}
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - APP_HOST=${DOMAIN_LITTLESTARS:-stars.iacomcafe.com}
      - SMTP_ADDRESS=${SMTP_ADDRESS}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_DOMAIN=${SMTP_DOMAIN}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ACADEMY_LLM_MODEL=${ACADEMY_LLM_MODEL}
      - ACADEMY_LLM_TEMPERATURE=${ACADEMY_LLM_TEMPERATURE}
      - ACADEMY_LLM_MAX_TOKENS=${ACADEMY_LLM_MAX_TOKENS}
    depends_on:
      littlestars-db:
        condition: service_healthy
    networks:
      - dokploy-network
    labels:
      # TLS termina no Cloudflare Tunnel; Traefik serve HTTP no origin.
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.littlestars.rule=Host(`${DOMAIN_LITTLESTARS:-stars.iacomcafe.com}`)"
      - "traefik.http.routers.littlestars.entrypoints=web"
      - "traefik.http.services.littlestars.loadbalancer.server.port=3000"
      - "dokploy.enabled=true"
      - "dokploy.name=littlestars-app"
      - "dokploy.type=app"

  littlestars-db:
    image: postgres:16-alpine
    container_name: littlestars-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PROD_POSTGRES_PASSWORD}
      - POSTGRES_DB=littlestars_production
    volumes:
      - littlestars-db-data:/var/lib/postgresql/data
      # Cria os bancos do Solid Queue/Cache/Cable no primeiro boot do volume.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network
    labels:
      - "dokploy.enabled=true"
      - "dokploy.name=littlestars-db"
      - "dokploy.type=app"

networks:
  dokploy-network:
    external: true

volumes:
  littlestars-db-data:
    driver: local
