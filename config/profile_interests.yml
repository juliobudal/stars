# Canonical catalog of kid-declarable interests.
#
# Used by:
#   - Kid::InterestsController to validate keys on save.
#   - ProfileInterest::Catalog (Ruby wrapper) for label/emoji lookups.
#   - Academy::Lens prompts (top key threaded into LearnerContext.interests).
#
# `key`  — short kebab-case identifier. Stable. Stored in profile_interests.interest_key.
# `label` — human-readable PT-BR label shown in the kid UI.
# `emoji` — single emoji shown on the chip; kept inline so reorders are visible.
#
# Adding a new interest: append a line; never reorder/rename keys (would
# orphan persisted data). Removing one: prefer marking `retired: true` and
# filtering in the catalog wrapper.

interests:
