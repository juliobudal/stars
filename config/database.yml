default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "db" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
  username: <%= ENV.fetch("DATABASE_USER") { "littlestars" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "littlestars_dev" } %>

development:
  <<: *default
  database: littlestars_development

test:
  <<: *default
  database: littlestars_test

production:
  primary: &primary_production
    <<: *default
    database: littlestars_production
    username: littlestars
    password: <%= ENV["APP_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: littlestars_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: littlestars_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: littlestars_production_cable
    migrations_paths: db/cable_migrate
