production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  daily_reset:
    class: DailyResetJob
    queue: default
    schedule: "every day at 12:01am"
  star_decay:
    class: StarDecayJob
    queue: default
    schedule: "every day at 3:00am"
