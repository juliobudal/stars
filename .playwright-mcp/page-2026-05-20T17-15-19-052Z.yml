              - paragraph [ref=e442]: "Aos 16, Tristan estudava magia. Não para enganar — para entender o truque por trás do truque. Como o mago segura sua atenção exatamente onde quer? Anos depois, ele entra no Google. Descobre que o lugar inteiro pensa igual: como prender olho humano em uma tela."
