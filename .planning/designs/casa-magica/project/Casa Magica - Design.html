<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Casa Mágica — Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<style>
  body { margin: 0; background: oklch(0.96 0.01 60); font-family: var(--font); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="foundations.jsx"></script>
<script type="text/babel">
const { useEffect } = React;

function App() {
  return (
    <DesignCanvas title="Casa Mágica — Design">
      <DCSection id="foundations" title="Fundações">
        <DCArtboard id="palette" label="Paleta (oklch refinada)" width={1340} height={420}>
          <div style={{ padding: 30 }}><Palette/></div>
        </DCArtboard>
        <DCArtboard id="type" label="Tipografia — Fredoka" width={1340} height={420}>
          <div style={{ padding: 30 }}><TypeScale/></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="screens" title="Telas (1280×720)">
        <DCArtboard id="s1" label="01 · Seleção de criança" width={1280} height={720}>
          <ScreenChildSelect/>
        </DCArtboard>
        <DCArtboard id="s2" label="02 · Cidade (vista iso 3/4)" width={1280} height={720}>
          <ScreenCity/>
        </DCArtboard>
        <DCArtboard id="s3" label="03 · Interior da casa" width={1280} height={720}>
          <ScreenHouseInterior/>
        </DCArtboard>
        <DCArtboard id="s4" label="04 · Modal: escolher cômodo" width={1280} height={720}>
          <ScreenRoomTemplateModal/>
        </DCArtboard>
      </DCSection>

      <DCSection id="components" title="Componentes">
        <DCArtboard id="comps" label="Botões, voltar, cards" width={1340} height={760}>
          <div style={{ padding: 30 }}><ComponentSheet/></div>
        </DCArtboard>
        <DCArtboard id="icons" label="Ícones de cômodo" width={1340} height={420}>
          <div style={{ padding: 30 }}><IconSheet/></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="characters" title="Personagens & Casas">
        <DCArtboard id="avatars" label="Avatares chibi (6 variações)" width={1340} height={520}>
          <div style={{ padding: 30 }}><AvatarSheet/></div>
        </DCArtboard>
        <DCArtboard id="houses" label="Casas exteriores (3 cores)" width={1340} height={500}>
          <div style={{ padding: 30 }}><HouseSheet/></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="motion" title="Animação">
        <DCArtboard id="tweens" label="Tabela de tweens (Phaser 3)" width={1340} height={780}>
          <div style={{ padding: 30 }}><TweenTable/></div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
