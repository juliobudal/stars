name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: littlestars
          POSTGRES_PASSWORD: littlestars_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U littlestars"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      DATABASE_URL: postgres://littlestars:littlestars_dev@localhost:5432/littlestars_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y \
            libpq-dev \
            libvips

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node (npm / yarn)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Build assets
        run: bin/vite build

      - name: Prepare database
        run: bin/rails db:prepare

      - name: Run RSpec
        run: bundle exec rspec --exclude-pattern "spec/system/**/*_spec.rb"

      - name: Lint with RuboCop
        run: bin/rubocop --no-color

      - name: Brakeman security scan
        run: bin/brakeman --no-pager

      - name: Gem vulnerability audit
        run: bin/bundler-audit --update
