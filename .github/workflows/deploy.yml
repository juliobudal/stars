name: Deploy

# Deploy Dokploy-nativo (servidor 192.168.1.13).
#
# O deploy é gerenciado pelo Dokploy: este workflow só DISPARA o deploy via API
# (Dokploy clona o repo + builda + sobe no servidor). Não há mais rsync/SSH.
#
# IMPORTANTE: o runner do GitHub (cloud) só alcança o Dokploy se a API estiver
# exposta publicamente (ex: via Cloudflare Tunnel). Em LAN pura, dispare o
# deploy localmente com `make dokploy-deploy` ou pelo painel/MCP do Dokploy.
#
# Testes/lint rodam no ci.yml. Secrets (Settings → Secrets and variables → Actions):
#   DOKPLOY_URL         ex: https://dokploy.seu-dominio (público, via tunnel)
#   DOKPLOY_API_KEY     token da API do Dokploy
#   DOKPLOY_COMPOSE_ID  id do compose service "guardian"
# Se DOKPLOY_URL não estiver definido, o job é pulado (não falha).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Dokploy deploy
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy via API do Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          if [ -z "$DOKPLOY_URL" ] || [ -z "$DOKPLOY_API_KEY" ] || [ -z "$DOKPLOY_COMPOSE_ID" ]; then
            echo "⚠  Secrets do Dokploy ausentes — deploy via CI desativado."
            echo "   Dispare localmente: make dokploy-deploy (ou painel/MCP do Dokploy)."
            exit 0
          fi
          echo "==> Disparando deploy do compose $DOKPLOY_COMPOSE_ID..."
          curl -fsS -X POST "$DOKPLOY_URL/api/compose.deploy" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"composeId\":\"$DOKPLOY_COMPOSE_ID\",\"title\":\"CI deploy ${GITHUB_SHA::7}\"}"
          echo ""
          echo "✓ Deploy enfileirado no Dokploy (acompanhe no painel)."
